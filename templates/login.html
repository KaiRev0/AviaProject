{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div id="overlay">
    <div class="spinner"></div>
    <p>Загрузка...</p>
</div>

<div class="form-container">
    <h2>Вход в систему</h2>
    
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="form-group">
            <label for="phone">Номер телефона:</label>
            <input type="text" id="phone" name="phone" 
                   maxlength="18" placeholder="+7 (999) 123-45-67" required>
        </div>
        
        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" maxlength="256" placeholder="********" required>
        </div>
        
        <button type="submit" class="btn">Войти</button>
    </form>
    
    <div class="links">
        <p>Нет аккаунта? 
            <a href="/register/client">Регистрация клиента</a> | 
            <a href="/register/cashier">Регистрация кассира</a>
        </p>
    </div>
</div>

<script src="https://unpkg.com/imask"></script>

<script>
    function onMaskLoaded() {
        document.getElementById('overlay').style.display = 'none';
    }
    IMask(
        document.getElementById('phone'),
        {
            mask: '+{7} (000) 000-00-00'
        }
    );
    onMaskLoaded();
</script>
{% endblock %}
